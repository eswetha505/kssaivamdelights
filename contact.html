<!DOCTYPE html>
<html>
<head>
<title>Contact - KS Saivam Delights</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5dc;
}

/* HEADER */

header{
background:#2e7d32;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:#ffd54f;
}

/* TITLE */

.contact-title{
text-align:center;
margin-top:40px;
font-size:36px;
color:#2e7d32;
}

/* CONTACT SECTION */

.contact-container{
display:flex;
justify-content:center;
gap:40px;
padding:50px;
flex-wrap:wrap;
}

/* INFO BOX */

.contact-info{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
width:300px;
}

.contact-info h3{
margin-bottom:15px;
color:#2e7d32;
}

/* FORM */

.contact-form{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
width:350px;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

.contact-form button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.contact-form button:hover{
background:#1b5e20;
}

/* MAP */

.map{
margin:40px auto;
width:90%;
max-width:800px;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* FOOTER */

footer{
background:#2e7d32;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">KS SAIVAM DELIGHTS</div>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<h1 class="contact-title">Contact Us</h1>

<div class="contact-container">

<div class="contact-info">

<h3>Restaurant Address</h3>
<p>KS Saivam Delights<br>
Chengam Road<br>
Tiruvannamalai, Tamil Nadu</p>

<br>

<h3>Phone</h3>
<p>+91 98765 43210</p>

<br>

<h3>Email</h3>
<p>kssaivamdelights@gmail.com</p>

</div>


<div class="contact-form">

<h3>Send Message</h3>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="5" placeholder="Your Message"></textarea>

<button>Send Message</button>

</div>

</div>

<div class="map">

<iframe
src="https://maps.google.com/maps?q=tiruvannamalai&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%"
height="350"
style="border:0;">
</iframe>

</div>

<footer>

© 2026 KS Saivam Delights | All Rights Reserved

</footer>

</body>
</html>
